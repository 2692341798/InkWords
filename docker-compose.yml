services:
  db:
    image: postgres:14-alpine
    container_name: inkwords-db
    environment:
      POSTGRES_USER: inkwords
      POSTGRES_PASSWORD: inkwords_password
      POSTGRES_DB: inkwords_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkwords -d inkwords_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkwords-backend
    env_file:
      - ./backend/.env
    environment:
      # 覆盖 .env 中的本地数据库连接，强制使用 Docker 内部网络连接 db 容器
      - DATABASE_URL=postgres://inkwords:inkwords_password@db:5432/inkwords_db?sslmode=disable
      - FRONTEND_URL=http://localhost
    ports:
      - "8081:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inkwords-frontend
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
