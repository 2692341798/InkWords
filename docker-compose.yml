services:
  obsidian-bridge:
    image: alpine/socat:latest
    container_name: inkwords-obsidian-bridge
    command: ["-d", "-d", "TCP-LISTEN:27125,fork,reuseaddr", "TCP:host.docker.internal:27124"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  db:
    image: postgres:14-alpine
    container_name: inkwords-db
    environment:
      POSTGRES_USER: inkwords
      POSTGRES_PASSWORD: inkwords_password
      POSTGRES_DB: inkwords_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkwords -d inkwords_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkwords-backend
    env_file:
      - ./backend/.env
    environment:
      # 覆盖 .env 中的本地数据库连接，强制使用 Docker 内部网络连接 db 容器
      - DATABASE_URL=postgres://inkwords:inkwords_password@db:5432/inkwords_db?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=http://localhost
      - OBSIDIAN_REST_API_BASE_URL=${OBSIDIAN_REST_API_BASE_URL:-https://obsidian-bridge:27125}
      - OBSIDIAN_REST_API_CERT_PATH=${OBSIDIAN_REST_API_CERT_PATH_INTERNAL:-/app/obsidian-cert/obsidian-local-rest-api-certificate.crt}
      - OBSIDIAN_REST_API_INSECURE_SKIP_VERIFY=${OBSIDIAN_REST_API_INSECURE_SKIP_VERIFY:-false}
      - OBSIDIAN_WIKI_DIR=${OBSIDIAN_WIKI_DIR:-wiki}
    ports:
      - "8081:8080"
    volumes:
      - uploads:/app/uploads
      - ${OBSIDIAN_VAULT_PATH:-/Users/huangqijun/Documents/obsidian_knowledge/knowledge/wiki}:/app/obsidian
      - ${OBSIDIAN_REST_API_CERT_PATH:-/etc/hosts}:/app/obsidian-cert/obsidian-local-rest-api-certificate.crt:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      obsidian-bridge:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: inkwords-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_ARGS=--maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inkwords-frontend
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  redisdata:
