name: inkwords

services:
  obsidian-bridge:
    image: alpine:3.19
    container_name: inkwords-obsidian-bridge
    command:
      - /bin/sh
      - -c
      - apk add --no-cache socat && socat -d -d TCP-LISTEN:27125,fork,reuseaddr TCP:host.docker.internal:27124
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "27125"
    networks:
      - inkwords-network
    restart: unless-stopped

  db:
    image: postgres:14-alpine
    container_name: inkwords-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inkwords}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inkwords_password}
      POSTGRES_DB: ${POSTGRES_DB:-inkwords_db}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - inkwords-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inkwords} -d ${POSTGRES_DB:-inkwords_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: inkwords-rabbitmq
    expose:
      - "5672"
      - "15672"
    networks:
      - inkwords-network
    restart: unless-stopped

  core-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkwords-core-api
    command: ["./core-api"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-inkwords}:${POSTGRES_PASSWORD:-inkwords_password}@db:5432/${POSTGRES_DB:-inkwords_db}?sslmode=disable
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      # Why: Docker mode is fronted by Nginx on http://localhost, so OAuth must
      # return through that public entrypoint instead of a Vite-only dev server.
      GITHUB_REDIRECT_URL: ${DOCKER_GITHUB_REDIRECT_URL:-http://localhost/api/v1/auth/callback/github}
      OBSIDIAN_REST_API_BASE_URL: ${OBSIDIAN_REST_API_BASE_URL:-https://obsidian-bridge:27125}
      OBSIDIAN_REST_API_KEY: ${OBSIDIAN_REST_API_KEY:-}
      OBSIDIAN_REST_API_CERT_PATH: ${OBSIDIAN_REST_API_CERT_PATH:-}
      OBSIDIAN_REST_API_INSECURE_SKIP_VERIFY: ${OBSIDIAN_REST_API_INSECURE_SKIP_VERIFY:-}
      OBSIDIAN_WIKI_DIR: ${OBSIDIAN_WIKI_DIR:-wiki}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-inkwords.events}
      RABBITMQ_GENERATION_QUEUE: ${RABBITMQ_GENERATION_QUEUE:-inkwords.generation}
      RABBITMQ_EXPORT_QUEUE: ${RABBITMQ_EXPORT_QUEUE:-inkwords.export}
      EXPORT_ARTIFACTS_DIR: ${EXPORT_ARTIFACTS_DIR:-/app/export-artifacts}
      JWT_SECRET: ${JWT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    expose:
      - "8080"
    volumes:
      - uploads:/app/uploads
      - export-artifacts:/app/export-artifacts
      # Why: require an explicit host wiki path instead of silently binding a
      # machine-specific absolute path that only works on one workstation.
      - type: bind
        source: ${OBSIDIAN_VAULT_PATH:?Set OBSIDIAN_VAULT_PATH in backend/.env (used with --env-file) or your shell environment}
        target: /app/obsidian
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      obsidian-bridge:
        condition: service_started
    networks:
      - inkwords-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  llm-stream:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkwords-llm-stream
    command: ["./llm-stream"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-inkwords}:${POSTGRES_PASSWORD:-inkwords_password}@db:5432/${POSTGRES_DB:-inkwords_db}?sslmode=disable
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-inkwords.events}
      RABBITMQ_GENERATION_QUEUE: ${RABBITMQ_GENERATION_QUEUE:-inkwords.generation}
      JWT_SECRET: ${JWT_SECRET:-}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - inkwords-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  parser-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkwords-parser-service
    command: ["./parser-service"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-inkwords}:${POSTGRES_PASSWORD:-inkwords_password}@db:5432/${POSTGRES_DB:-inkwords_db}?sslmode=disable
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-inkwords.events}
      RABBITMQ_PARSE_QUEUE: ${RABBITMQ_PARSE_QUEUE:-inkwords.parse}
      JWT_SECRET: ${JWT_SECRET:-}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - inkwords-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  export-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkwords-export-service
    command: ["./export-service"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-inkwords}:${POSTGRES_PASSWORD:-inkwords_password}@db:5432/${POSTGRES_DB:-inkwords_db}?sslmode=disable
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      OBSIDIAN_REST_API_BASE_URL: ${OBSIDIAN_REST_API_BASE_URL:-https://obsidian-bridge:27125}
      OBSIDIAN_REST_API_KEY: ${OBSIDIAN_REST_API_KEY:-}
      OBSIDIAN_REST_API_CERT_PATH: ${OBSIDIAN_REST_API_CERT_PATH:-}
      OBSIDIAN_REST_API_INSECURE_SKIP_VERIFY: ${OBSIDIAN_REST_API_INSECURE_SKIP_VERIFY:-}
      OBSIDIAN_WIKI_DIR: ${OBSIDIAN_WIKI_DIR:-wiki}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-inkwords.events}
      RABBITMQ_EXPORT_QUEUE: ${RABBITMQ_EXPORT_QUEUE:-inkwords.export}
      EXPORT_ARTIFACTS_DIR: ${EXPORT_ARTIFACTS_DIR:-/app/export-artifacts}
      JWT_SECRET: ${JWT_SECRET:-}
    expose:
      - "8080"
    volumes:
      - export-artifacts:/app/export-artifacts
      - type: bind
        source: ${OBSIDIAN_VAULT_PATH:?Set OBSIDIAN_VAULT_PATH in backend/.env (used with --env-file) or your shell environment}
        target: /app/obsidian
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      obsidian-bridge:
        condition: service_started
    networks:
      - inkwords-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  review-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkwords-review-service
    command: ["./review-service"]
    environment:
      REVIEW_DATABASE_URL: postgres://${POSTGRES_USER:-inkwords}:${POSTGRES_PASSWORD:-inkwords_password}@db:5432/inkwords_review_db?sslmode=disable
      OBSIDIAN_REST_API_BASE_URL: ${OBSIDIAN_REST_API_BASE_URL:-https://obsidian-bridge:27125}
      OBSIDIAN_REST_API_KEY: ${OBSIDIAN_REST_API_KEY:-}
      OBSIDIAN_REST_API_CERT_PATH: ${OBSIDIAN_REST_API_CERT_PATH:-}
      OBSIDIAN_REST_API_INSECURE_SKIP_VERIFY: ${OBSIDIAN_REST_API_INSECURE_SKIP_VERIFY:-}
      OBSIDIAN_WIKI_DIR: ${OBSIDIAN_WIKI_DIR:-wiki}
      JWT_SECRET: ${JWT_SECRET:-}
    expose:
      - "8080"
    volumes:
      - type: bind
        source: ${OBSIDIAN_VAULT_PATH:?Set OBSIDIAN_VAULT_PATH in backend/.env (used with --env-file) or your shell environment}
        target: /app/obsidian
    depends_on:
      db:
        condition: service_healthy
      obsidian-bridge:
        condition: service_started
    networks:
      - inkwords-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis/redis-stack-server:7.2.0-v9
    container_name: inkwords-redis
    expose:
      - "6379"
    environment:
      - REDIS_ARGS=--maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - inkwords-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inkwords-frontend
    ports:
      - "80:80"
    depends_on:
      core-api:
        condition: service_healthy
      llm-stream:
        condition: service_healthy
      parser-service:
        condition: service_healthy
      export-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
    networks:
      - inkwords-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  inkwords-network:
    driver: bridge

volumes:
  pgdata:
  uploads:
  redisdata:
  export-artifacts:
